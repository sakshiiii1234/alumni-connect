<h2>All Resources</h2>

{% for post in posts %}

<div style="border:1px solid #ccc; padding:10px; margin:10px;">
    <h3>{{ post.title }}</h3>
    <p>{{ post.description }}</p>
    <p>By: {{ post.created_by.username }}</p>

    {% if post.file %}
        <a href="{{ post.file.url }}">Download File</a>
    {% endif %}

    {% if post.link %}
        <br>
        <a href="{{ post.link }}" target="_blank">Open Link</a>
    {% endif %}
</div>

{% empty %}
<p>No posts yet.</p>
{% endfor %}
